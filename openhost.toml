[app]
name = "catalog"
version = "0.1.0"
description = "OpenHost app discovery and one-click deployment catalog"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/healthz"

[resources]
memory_mb = 1024
cpu_millicores = 500

[data]
sqlite = ["main"]
app_data = true

[services.secrets]
keys = [
  { key = "key:APP_REPO_ROUTER_TOKEN", reason = "Deploy apps via OpenHost router API", required = false }
]
